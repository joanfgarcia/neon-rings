name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: ".python-version"
        
    - name: Install dependencies
      run: uv sync --all-extras --dev
      
    - name: Run Ruff (Protocol of Silence)
      run: uv run ruff check src/ tests/
      
    - name: Run Mypy (Type checking)
      run: uv run mypy src/
      
    - name: Run tests with coverage (96% enforced)
      run: uv run pytest --cov=src --cov-fail-under=96 --cov-report=xml
